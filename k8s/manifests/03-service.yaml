apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort               # expose outside the cluster via a port on the node
  selector:
    app: nginx                 # forward traffic to all Pods with this label
  ports:
    - port: 80                 # Service's virtual port (cluster-internal)
      targetPort: 80           # the port on the Pod to forward to
      nodePort: 30080          # port on the node/host (30000-32767)
